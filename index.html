<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genius AI Chat</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --panel-bg: #2d2d2d;
            --btn-color: #2480f8;
        }
        .light-theme {
            --bg-color: #f0f2f5;
            --text-color: #000000;
            --panel-bg: #ffffff;
            --btn-color: #007aff;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Верхня панель (тепер без кнопки "Весь екран") */
        .top-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background-color: var(--panel-bg);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            background-color: var(--btn-color);
            color: white;
        }

        .btn-close {
            background-color: #ff3b30;
        }

        /* Зона чату */
        .chat-container {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Плавна анімація появи повідомлень */
        .message {
            max-width: 80%;
            padding: 10px;
            border-radius: 10px;
            line-height: 1.4;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.4s ease forwards;
        }
        .bot { background-color: var(--panel-bg); align-self: flex-start; }
        .user { background-color: var(--btn-color); color: white; align-self: flex-end; }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Анімація індикатора друку ШІ */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 15px;
            background-color: var(--panel-bg);
            align-self: flex-start;
            border-radius: 10px;
            animation: fadeIn 0.3s ease forwards;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--text-color);
            border-radius: 50%;
            opacity: 0.4;
            animation: pulse 1.2s infinite ease-in-out;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Нижня панель вводу */
        .bottom-panel {
            padding: 10px;
            background-color: var(--panel-bg);
            display: flex;
            gap: 10px;
        }

        .input-field {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: transparent;
            color: var(--text-color);
            outline: none;
            transition: border-color 0.2s;
        }
        .input-field:focus {
            border-color: var(--btn-color);
        }
    </style>
</head>
<body>

    <div class="top-panel">
        <button class="btn" onclick="toggleTheme()">🌓 Тема</button>
        <button class="btn btn-close" onclick="closeApp()">❌ Закрити</button>
    </div>

    <div class="chat-container" id="chat">
        <div class="message bot">Привіт! Я твій ШІ-асистент. Тепер ти можеш відправляти повідомлення на Enter, а інтерфейс став більш живим! ✨</div>
    </div>

    <div class="bottom-panel">
        <input type="text" id="msgInput" class="input-field" placeholder="Запитай у ШІ..." onkeydown="checkEnter(event)">
        <button class="btn" onclick="sendMessage()">🚀</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Одразу розгортаємо додаток на максимум при відкритті

        if (tg.BackButton) {
            tg.BackButton.hide();
        }

        function closeApp() {
            tg.close();
        }

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
        }

        // Функція перевірки натискання Enter
        function checkEnter(event) {
            if (event.key === 'Enter') {
                event.preventDefault(); // Запобігаємо стандартному переносу рядка
                sendMessage();
            }
        }

        // Функція відправки повідомлення до Flowise
        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;

            // Додаємо повідомлення користувача
            appendMessage(text, 'user');
            input.value = '';

            // Показуємо анімацію трикрапки (ШІ думає)
            showTypingIndicator();

            try {
                const response = await fetch("https://cloud.flowiseai.com/api/v1/prediction/bcbe9834-1547-4656-b4a0-d3446e14f571", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        question: text,
                        overrideConfig: { sessionId: "tg_webapp_" + (tg.initDataUnsafe.user?.id || "default_user") }
                    })
                });
                
                const data = await response.json();
                
                // Видаляємо індикатор друку перед появою відповіді
                removeTypingIndicator();
                
                // Плавно виводимо відповідь бота
                appendMessage(data.text || data.output || "Помилка відповіді", 'bot');
            } catch (e) {
                removeTypingIndicator();
                appendMessage("Помилка зв'язку з ШІ", 'bot');
            }
        }

        function appendMessage(text, sender) {
            const chat = document.getElementById('chat');
            const msgHtml = `<div class="message ${sender}">${text}</div>`;
            chat.insertAdjacentHTML('beforeend', msgHtml);
            chat.scrollTop = chat.scrollHeight;
        }

        // Створення та видалення індикатора друку
        function showTypingIndicator() {
            const chat = document.getElementById('chat');
            const indicatorHtml = `
                <div class="typing-indicator" id="typingIndicator">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>`;
            chat.insertAdjacentHTML('beforeend', indicatorHtml);
            chat.scrollTop = chat.scrollHeight;
        }

        if (tg.BackButton) {
            tg.BackButton.hide();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }
    </script>
</body>
</html>
