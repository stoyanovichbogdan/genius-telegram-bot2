<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genius AI Chat</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Стилі для темної та світлої тем */
        :root {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --panel-bg: #2d2d2d;
            --btn-color: #2480f8;
        }
        .light-theme {
            --bg-color: #f0f2f5;
            --text-color: #000000;
            --panel-bg: #ffffff;
            --btn-color: #007aff;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Верхня панель керування */
        .top-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background-color: var(--panel-bg);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            background-color: var(--btn-color);
            color: white;
        }

        .btn-close {
            background-color: #ff3b30;
        }

        /* Зона чату */
        .chat-container {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 80%;
            padding: 10px;
            border-radius: 10px;
            line-height: 1.4;
        }
        .bot { background-color: var(--panel-bg); align-self: flex-start; }
        .user { background-color: var(--btn-color); color: white; align-self: flex-end; }

        /* Нижня панель вводу */
        .bottom-panel {
            padding: 10px;
            background-color: var(--panel-bg);
            display: flex;
            gap: 10px;
        }

        .input-field {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: transparent;
            color: var(--text-color);
        }
    </style>
</head>
<body>

    <div class="top-panel">
        <button class="btn" onclick="toggleTheme()">🌓 Тема</button>
        <button class="btn" onclick="toggleFullscreen()">🔲 Весь екран</button>
        <button class="btn btn-close" onclick="closeApp()">❌ Закрити</button>
    </div>

    <div class="chat-container" id="chat">
        <div class="message bot">Привіт! Я твій ШІ-асистент всередині Telegram WebApp. Напиши щось!</div>
    </div>

    <div class="bottom-panel">
        <input type="text" id="msgInput" class="input-field" placeholder="Запитай у ШІ...">
        <button class="btn" onclick="sendMessage()">🚀</button>
    </div>

    <script>
        // Ініціалізуємо Telegram WebApp API
        const tg = window.Telegram.WebApp;
        tg.ready(); // Кажемо Телеграму, що додаток завантажився

        // 1. Хрестик (Закрити додаток)
        if (tg.BackButton) {
            tg.BackButton.hide();
        }

        function closeApp() {
            tg.close();
        }

        // 2. Перемикач тем
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
        }

        // 3. На весь екран (Команда Telegram WebApp)
        function toggleFullscreen() {
            tg.expand();
        }

        // Функція відправки повідомлення до вашого Flowise
        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            input.value = '';

            try {
                const response = await fetch("https://cloud.flowiseai.com/api/v1/prediction/bcbe9834-1547-4656-b4a0-d3446e14f571", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        question: text,
                        overrideConfig: { sessionId: "tg_webapp_" + (tg.initDataUnsafe.user?.id || "default_user") }
                    })
                });
                const data = await response.json();
                appendMessage(data.text || data.output || "Помилка відповіді", 'bot');
            } catch (e) {
                appendMessage("Помилка зв'язку з ШІ", 'bot');
            }
        }

        function appendMessage(text, sender) {
            const chat = document.getElementById('chat');
            const msgHtml = `<div class="message ${sender}">${text}</div>`;
            chat.insertAdjacentHTML('beforeend', msgHtml);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
