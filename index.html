<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genius AI Chat</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --panel-bg: #2d2d2d;
            --btn-color: #2480f8;
        }
        .light-theme {
            --bg-color: #f0f2f5;
            --text-color: #000000;
            --panel-bg: #ffffff;
            --btn-color: #007aff;
        }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .top-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background-color: var(--panel-bg);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            gap: 5px;
        }
        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            background-color: var(--btn-color);
            color: white;
            transition: opacity 0.2s;
            flex: 1;
            text-align: center;
            white-space: nowrap;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-clear { background-color: #ff9500; } /* Помаранчевий колір для очищення */
        .btn-close { background-color: #ff3b30; max-width: 40px; } /* Червоний для закриття */
        
        .chat-container {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 80%;
            padding: 10px;
            border-radius: 10px;
            line-height: 1.4;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.4s ease forwards;
        }
        .bot { background-color: var(--panel-bg); align-self: flex-start; }
        .user { background-color: var(--btn-color); color: white; align-self: flex-end; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 15px;
            background-color: var(--panel-bg);
            align-self: flex-start;
            border-radius: 10px;
            animation: fadeIn 0.3s ease forwards;
        }
        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--text-color);
            border-radius: 50%;
            opacity: 0.4;
            animation: pulse 1.2s infinite ease-in-out;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .bottom-panel {
            padding: 10px;
            background-color: var(--panel-bg);
            display: flex;
            gap: 10px;
        }
        .input-field {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: transparent;
            color: var(--text-color);
            outline: none;
        }
        .input-field:disabled {
            background-color: rgba(255,255,255,0.05);
            border-color: #444;
        }
    </style>
</head>
<body>

    <div class="top-panel">
        <button class="btn" onclick="toggleTheme()">🌓 Тема</button>
        <button class="btn btn-clear" id="clearBtn" onclick="clearChat()">🗑️ Очистити</button>
        <button class="btn btn-close" onclick="closeApp()">❌</button>
    </div>

    <div class="chat-container" id="chat">
        </div>

    <div class="bottom-panel">
        <input type="text" id="msgInput" class="input-field" placeholder="Запитай у ШІ..." onkeydown="checkEnter(event)">
        <button class="btn" id="sendBtn" onclick="sendMessage()">🚀</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let isAiThinking = false;

        // Завантажуємо історію при старті
        window.onload = function() {
            loadChatHistory();
        };

        function closeApp() { tg.close(); }
        function toggleTheme() { document.body.classList.toggle('light-theme'); }

        function checkEnter(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                sendMessage();
            }
        }

        // Функція ПОВНОГО очищення чату
        function clearChat() {
            if (isAiThinking) return; // Не дозволяємо чистити чат, поки ШІ відповідає
            
            if (confirm("Ви впевнені, що хочете очистити всю історію чату?")) {
                // Видаляємо все з пам'яті браузера
                localStorage.removeItem('saved_chat_html');
                localStorage.removeItem('dify_conversation_id');
                
                // Скидаємо екран чату до початкового стану
                const chat = document.getElementById('chat');
                chat.innerHTML = `<div class="message bot">Історію успішно очищено! Про що хочеш поговорити тепер? 🚀</div>`;
            }
        }

        // Функція відправки повідомлення до Dify.ai
        async function sendMessage() {
            if (isAiThinking) return;

            const input = document.getElementById('msgInput');
            const sendBtn = document.getElementById('sendBtn');
            const clearBtn = document.getElementById('clearBtn');
            const text = input.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            input.value = '';

            // Блокуємо елементи інтерфейсу
            isAiThinking = true;
            input.disabled = true;
            sendBtn.disabled = true;
            clearBtn.disabled = true; // Блокуємо і кнопку очищення під час запиту
            input.placeholder = "ШІ думає над відповіддю...";

            showTypingIndicator();

            // ⚠️ ВСТАВТЕ СЮДИ ВАШ КЛЮЧ З DIFY (який починається на app-...)
            const DIFY_API_KEY = "app-kOUTSfhYF6yKO0Ibb7B3d3Nf"; 

            const savedConversationId = localStorage.getItem('dify_conversation_id') || "";

            try {
                const response = await fetch("https://api.dify.ai/v1/chat-messages", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${DIFY_API_KEY}`
                    },
                    body: JSON.stringify({
                        inputs: {},
                        query: text,
                        response_mode: "blocking",
                        conversation_id: savedConversationId,
                        user: "tg_webapp_" + (tg.initDataUnsafe.user?.id || "default_user")
                    })
                });
                
                const data = await response.json();
                removeTypingIndicator();
                
                if (data.conversation_id) {
                    localStorage.setItem('dify_conversation_id', data.conversation_id);
                }

                appendMessage(data.answer || "Помилка відповіді від ШІ", 'bot');
            } catch (e) {
                removeTypingIndicator();
                appendMessage("Помилка зв'язку з ШІ", 'bot');
            } finally {
                // Розблоковуємо інтерфейс
                isAiThinking = false;
                input.disabled = false;
                sendBtn.disabled = false;
                clearBtn.disabled = false;
                input.placeholder = "Запитай у ШІ...";
                input.focus();
            }
        }

        function appendMessage(text, sender) {
            const chat = document.getElementById('chat');
            const msgHtml = `<div class="message ${sender}">${text}</div>`;
            chat.insertAdjacentHTML('beforeend', msgHtml);
            chat.scrollTop = chat.scrollHeight;

            saveChatHistory();
        }

        function showTypingIndicator() {
            const chat = document.getElementById('chat');
            const indicatorHtml = `<div class="typing-indicator" id="typingIndicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
            chat.insertAdjacentHTML('beforeend', indicatorHtml);
            chat.scrollTop = chat.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function saveChatHistory() {
            const chatContent = document.getElementById('chat').innerHTML;
            localStorage.setItem('saved_chat_html', chatContent);
        }

        function loadChatHistory() {
            const chat = document.getElementById('chat');
            const savedContent = localStorage.getItem('saved_chat_html');
            
            if (savedContent && savedContent.trim() !== "") {
                chat.innerHTML = savedContent;
                chat.scrollTop = chat.scrollHeight;
            } else {
                chat.innerHTML = `<div class="message bot">Привіт! Я твій новий ШІ-асистент. Наша історія тепер зберігається! 🚀</div>`;
            }
        }
    </script>
</body>
</html>
